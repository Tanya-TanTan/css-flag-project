<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flag of India</title>
    <style>
        .flag {
            background-color: white;
            width: 900px;
            height: 600px;
            position: relative;
        }

        .flag>div {
            background-color: #FF9933;
            width: 100%;
            height: 200px;
            position: absolute;
        }

        .flag>div div div {
            background-color: #138808;
            width: 100%;
            height: 200px;
            position: absolute;
            top: 400px;
        }
        
        img {
            height: 200px;
            width: 200px;
            position: absolute;
            left: 350px;
            top: 200px;
        }

        p {
            color: white;
            text-align: center;
            font-size: 5rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="flag">
        <img src="./Images/Ashoka Chakra.png" alt="Ashoka Chakra">
        <div>
        <p>The Flag</p>
            <div>
                <div>
                    <p>of India</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
